services:
    prometheus:
      image: prom/prometheus:v2.54.1
      container_name: FuturKawa_prometheus
      restart: unless-stopped
      ports:
        - "9090:9090"
      volumes:
        - prometheus_data:/prometheus
        - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      command:
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.path=/prometheus
        - --web.enable-lifecycle
      networks:
        - monitoring

    grafana:
      image: grafana/grafana-oss:11.1.0
      container_name: FuturKawa_grafana
      restart: unless-stopped
      ports:
        - "3333:3000"
      environment:
        GF_SECURITY_ADMIN_USER: admin
        GF_SECURITY_ADMIN_PASSWORD: admin
      volumes:
        - grafana_data:/var/lib/grafana
      depends_on:
        - prometheus
      networks:
        - monitoring

    mysql_exporter_country:
      image: prom/mysqld-exporter:v0.16.0
      container_name: FuturKawa_mysql_exporter_country
      restart: unless-stopped
      ports:
        - "9104:9104"
      environment:
        DATA_SOURCE_NAME: "exporter:exporterpassword@(backend_country:3306)/"
      networks:
        - monitoring

    mysql_exporter_head_office:
      image: prom/mysqld-exporter:v0.16.0
      container_name: FuturKawa_mysql_exporter_head_office
      restart: unless-stopped
      ports:
        - "9105:9104"
      environment:
        DATA_SOURCE_NAME: "exporter:exporterpassword@(backend_head_office:3306)/"
      networks:
        - monitoring

volumes:
    prometheus_data:
    grafana_data:

networks:
    monitoring:
      driver: bridge
