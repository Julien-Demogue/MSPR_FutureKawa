---
global:
  scrape_interval: 15s
  evaluation_interval: 15s
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090
  - job_name: mysql_exporter_country
    static_configs:
      - targets:
          - mysql_exporter_country:9104
  - job_name: mysql_exporter_head_office
    static_configs:
      - targets:
          - mysql_exporter_head_office:9104
